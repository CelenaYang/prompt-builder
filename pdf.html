<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PDF 轉圖片 - Prompt Builder</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-top">
        <div class="page-title-group">
          <h1>PDF 轉圖片</h1>
        </div>

        <nav class="page-nav">
          <button class="btn btn-secondary" id="navIndexBtn">範本列表</button>
          <button class="btn btn-secondary" id="navUploadBtn">上傳範本</button>
          <button class="btn btn-secondary active" id="navPdfBtn">PDF轉圖片</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="pdf-layout">
        <div class="pdf-left card pdf-left">
          <div class="pdf-dropzone" id="pdfDropzone">
            <div>拖曳 PDF 或點擊上傳</div>
            <input type="file" id="pdfFileInput" accept="application/pdf" hidden />
          </div>

          <div class="pdf-meta">
            <div>檔名：<span id="pdfFileName">尚未上傳</span></div>
            <div>總頁數：<span id="pdfTotalPages">-</span></div>
          </div>

<div class="pdf-options">
  <div class="pdf-field">
    <label class="pdf-label" for="pdfPagesInput">要匯出的頁碼（空白或 all = 全部）</label>
    <input id="pdfPagesInput" class="pdf-pages-input" placeholder="例：all / 3 / 2-5 / 1,3,5-7" />
  </div>

<div class="pdf-field">
  <label class="pdf-label">格式</label>
  <div class="pdf-format-toggle pdf-format-toggle-bar" role="tablist" aria-label="格式選擇">
    <button type="button" id="formatPng" class="pdf-format-btn active" data-ext="png">PNG</button>
    <button type="button" id="formatJpg" class="pdf-format-btn" data-ext="jpg">JPG</button>
  </div>
    <input type="hidden" name="pdfFormat" id="pdfFormatHidden" value="png" />
</div>

    <div class="pdf-field">
        <button id="pdfDownloadBtn" class="btn-primary pdf-download-btn">下載圖片</button>
        <div class="pdf-status" id="pdfStatus"></div>
    </div>
    </div>

          <p class="pdf-hint">提示：可使用逗號或範圍指定頁碼，系統會去重並排序。</p>
        </div>

        <div class="pdf-right">
          <div class="pdf-preview-grid" id="pdfPreviewGrid">
            <!-- thumbnails inserted here -->
          </div>
        </div>
      </div>
    </main>

    <!-- pdf.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
      // set worker src
      if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <script type="module" src="js/pdf.js"></script>
  </body>
</html>
