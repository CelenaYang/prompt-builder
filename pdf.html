<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PDF 轉圖片 - Prompt Builder</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-top">
        <div class="page-title-group">
          <h1>PDF 轉圖片</h1>
        </div>

        <nav class="page-nav">
          <button class="btn btn-secondary" id="navIndexBtn">範本列表</button>
          <button class="btn btn-secondary" id="navUploadBtn">上傳範本</button>
          <button class="btn btn-secondary active" id="navPdfBtn">PDF轉圖片</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <!-- 上方：上傳區塊（只保留上傳框、已上傳 X、上傳狀態） -->
      <section id="pdf-upload-panel" class="card" style="padding:14px; width:100%;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div id="pdfDropzone" class="pdf-dropzone" style="flex:1;min-height:86px;display:flex;align-items:center;justify-content:center;">
            <div>拖曳多個 PDF 或點擊上傳（支援同時多檔）</div>
            <input type="file" id="pdfFileInput" accept="application/pdf" hidden multiple />
          </div>

          <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;min-width:180px;">
            <button id="uploadedCountBtn" class="btn btn-secondary">已上傳 <span id="pdfFileCount">0</span></button>
            <div id="pdfStatus" class="pdf-status">尚未上傳檔案</div>
          </div>
        </div>
      </section>

      <!-- 上傳區下方：預覽區（次要資訊） -->
      <section id="pdf-preview-section" style="width:100%;">
        <div id="pdfPreviewGrid" class="pdf-preview-grid" style="margin-top:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
          <!-- thumbnails inserted here -->
        </div>
      </section>

      <!-- 下方：兩個功能區（直向排列） -->
      <section id="pdf-action-vertical" style="width:100%;display:flex;flex-direction:column;gap:18px;">
        <!-- 下載圖片卡（使用既有樣式） -->
        <div class="card">
          <div class="card-body">
            <h3 class="card-title">下載圖片</h3>
            <label class="pdf-label" for="downloadPagesInput">頁碼（例：all / 1 / 2-4 / 1,3）</label>
            <input id="downloadPagesInput" class="pdf-pages-input" placeholder="all / 3 / 2-5 / 1,3,5-7" />

            <label class="pdf-label">格式</label>
            <div class="pdf-format-toggle-bar" role="tablist" aria-label="格式選擇">
              <button type="button" id="downloadFormatPng" class="pdf-format-btn active" data-ext="png">PNG</button>
              <button type="button" id="downloadFormatJpg" class="pdf-format-btn" data-ext="jpg">JPG</button>
            </div>

            <div class="form-actions" style="margin-top:12px;">
              <button id="downloadImagesBtn" class="btn-primary">下載圖片</button>
            </div>
          </div>
        </div>

        <!-- 合併卡（使用既有樣式） -->
        <div class="card">
          <div class="card-body">
            <h3 class="card-title">檔案合併</h3>
            <div id="mergeFileList" class="merge-file-list">
              <!-- 合併清單由 js 動態建立 -->
            </div>
            <div class="form-actions" style="margin-top:12px;display:flex;gap:8px;">
              <button id="exportCombinedPdfBtn" class="btn-primary">匯出合併 PDF</button>
              <button id="clearAllBtn" class="btn btn-secondary">清除全部</button>
            </div>
            <div class="small-muted" style="margin-top:8px">設定每份檔案要合併的頁碼後，再按「匯出合併 PDF」。上傳狀態請參考上方上傳區。</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // inline popover toggle (minimal, 不修改外部 js)
      (function(){
        const btn = document.getElementById('uploadedCountBtn');
        const pop = document.getElementById('uploadedPopover');
        const closeBtn = document.getElementById('popoverCloseBtn');
        if(!btn || !pop) return;
        function show(){ pop.style.display='block'; pop.classList.remove('hidden'); pop.setAttribute('aria-hidden','false'); }
        function hide(){ pop.style.display='none'; pop.classList.add('hidden'); pop.setAttribute('aria-hidden','true'); }
        btn.addEventListener('click', ()=>{ if(pop.classList.contains('hidden')) show(); else hide(); });
        if(closeBtn) closeBtn.addEventListener('click', hide);
        // close on outside click
        document.addEventListener('click', (e)=>{
          if(!pop || pop.classList.contains('hidden')) return;
          if(e.target === btn || btn.contains(e.target)) return;
          if(pop.contains(e.target)) return;
          hide();
        });
      })();
    </script>

    <!-- pdf.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
      // set worker src
      if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <!-- PDF-lib for merging pages -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="js/pdf.js"></script>
  </body>
</html>
